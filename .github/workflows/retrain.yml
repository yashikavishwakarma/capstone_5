name: Fall Detection — Retrain & Validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data
        run: python simulate_data.py

      - name: Train model
        run: python train.py

      - name: Quality gate (accuracy must be ≥ 80%)
        run: |
          python -c "
          import json
          with open('model/metrics.json') as f:
              m = json.load(f)
          acc = m['accuracy']
          print(f'Accuracy: {acc}')
          assert acc >= 0.80, f'Quality gate FAILED: accuracy {acc} < 0.80'
          print('Quality gate PASSED ✅')
          "